name: Build release assets

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Verify release tag matches package version
        run: bun run release:verify -- "${{ github.event.release.tag_name }}"

      - run: bun run check

      - run: bun run test

      - run: bun run audit

      - run: bun run prepare:export-viewer-release-assets

      - name: Upload export viewer release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/export-viewer-release-assets/* --clobber
